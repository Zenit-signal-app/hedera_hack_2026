<!DOCTYPE HTML>
<html>
	<head>

		<title>TradingView Charting Library demo</title>

		<!-- Fix for iOS Safari zooming bug -->
		<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="IE=Edge">

		<script type="text/javascript" src="//code.jquery.com/jquery-1.11.2.min.js"></script>
		<script>window.jQuery || document.write('<script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"><\/script>')</script>
		<script type="text/javascript" src="charting_library/charting_library.min.js"></script>
		<script type="text/javascript" src="charting_library/datafeed/udf/datafeed.js"></script>

		<script type="text/javascript">
		
			TradingView.onready(function()
			{
				var widget = window.tvWidget = new TradingView.widget({

					fullscreen: true,
					library_path: "charting_library/",
					locale: "en",
					symbol: 'SOFIX',
					interval: 'D',

					// Sets initial timeframe for the chart
					timeframe: '3M',

					// Delay in milliseconds to wait after key is pressed before making a symbol search request
					symbol_search_request_delay: 500,
					container_id: "tv_chart_container",


					// Regression Trend-related functionality is not implemented yet, so it's hidden for a while
					drawings_access: { type: 'black', tools: [ { name: "Regression Trend" } ] },

					// "volume_force_overlay" - places Volume indicator on the same pane with the main series
					disabled_features: [ "use_localstorage_for_settings", "volume_force_overlay" ],
					enabled_features: [ "study_templates" ],

					// Overrides
					overrides: {
				    	// default volumePaneSize (supported values: "large", "medium", "small", "tiny")
				    	"volumePaneSize": "small",
				    	// Change time zone - bottom on chart
				        "timezone": "Europe/Athens",
				        //
				        "timeScale.rightOffset": 0,
				        //
				        "symbolWatermarkProperties.color" : "rgba(3, 79, 132, 0.1)"
				    },

					// Save and Load Chart Layout
					
					charts_storage_url: 'http://saveload.tradingview.com',
                    charts_storage_api_version: "1.1",
					client_id: 'bse-sofia',
					user_id: 'test',
					

					// Try some favorites
					/*
					favorites: {
				        intervals: ["1D", "W", "M"],
				        chartTypes: ["Area", "Line"]
				    }
				    */

					// BEWARE: no trailing slash is expected in feed URL
					// Set Update Interval to 24h ( 86400000 milliseconds )
					datafeed: new Datafeeds.UDFCompatibleDatafeed( "http://212.95.174.33/get/charts", 86400000 )
				});

				widget.onChartReady( function() { 
					//console.log(window.tvWidget);
					//setTimeout(function() {
						// Set Right Offset on time scale (default is 10)
		                //window.tvWidget.applyOverrides( {'timeScale.rightOffset': 5} );
		            //}, 100 );
				} );

				//widget.onDataLoaded( function() { console.log(window.tvWidget); } );
				//widget.applyOverrides({'timeScale.rightOffset': 0});

			});

		</script>

	</head>

	<body style="margin:0px;">
		<div id="tv_chart_container"></div>
	</body>

</html>
